server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index player.html;

    # Load MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location / {
        try_files $uri $uri/ /player.html;
    }

    # DASH manifest
    types {
        application/dash+xml mpd;
        video/mp4 m4s;
    }

    location ~* \.m4s$ {
        add_header Cache-Control no-cache;
    }
}
